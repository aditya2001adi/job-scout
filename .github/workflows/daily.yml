name: Daily Job Digest

on:
  schedule:
    # 11 AM CST (UTC-6) = 17:00 UTC  ← temporary for testing
    # Change back to "0 13 * * *" for 8 AM CDT daily
    - cron: "15 17 * * *"
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

permissions:
  contents: write  # needed to push jobs.db back to repo

jobs:
  job-scout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Job Scout
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 main.py --no-claude

      - name: Commit updated dedup DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.db
          git diff --cached --quiet || git commit -m "chore: update dedup DB [skip ci]"
          git push
