# ---------- HIRING CAFE SETTINGS ----------
hiring_cafe:
  # Search queries to run — each gets its own API call
  queries:
    - "strategy operations"
    - "chief of staff"
    - "program manager nonprofit"
    - "policy analyst"
  workplace_types:
    - "Remote"
    - "Hybrid"
    - "Onsite"
  seniority:
    - "Entry Level"
    - "Mid Level"
  commitment_types:
    - "Full Time"
  date_posted_days: 7   # Only fetch jobs posted in last N days

# ---------- PROGRESSIVE DATA JOBS SETTINGS ----------
progressive_data:
  url: "https://www.progressivedatajobs.org/job-postings/"
  # Filter by these title keywords (if empty, fetches all)
  title_filter: []

