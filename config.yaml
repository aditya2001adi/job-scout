# ---------- EXPERIENCE FILTER ----------
# Graduated penalties — applied after keyword scoring (so good-fit jobs can still partially rank).
# hard_disqualify_years: instant reject (return -1.0)
# heavy_penalty_years:   -50 pts (nearly always filtered by min_score threshold)
# steep_penalty_years:   -25 pts (may still surface if everything else scores very high)
# Note: "3-5 years" passes through (lower bound 3 < 5); only triggers when lower bound >= threshold.
experience_filter:
  hard_disqualify_years: 10
  heavy_penalty_years: 7
  steep_penalty_years: 5

# ---------- DATE FILTER ----------
date_filter:
  days: 7   # Only show jobs posted/updated in the last N days (ATS + Progressive Data)
            # Override per-run with --no-date-filter to seed the dedup DB on first run

# ---------- TITLE KEYWORDS (positive signals) ----------
# A job title matching ANY of these gets a score boost.
title_keywords:
  tier1:   # Strong match — high boost (+30)
    - "strategy & operations"
    - "business operations"
    - "strategy"
    - "operations"
    - "chief of staff"
    - "strategic"
    - "GTM operations"
    - "GTM"          # "GTM Strategy", "GTM Strategic Initiative Associate", etc.
    - "associate"    # Adi's primary seniority level — appears in 25+ applied titles
  tier2:   # Good match — medium boost (+15)
    - "program manager"
    - "product manager"
    - "project manager"
    - "business development"
    - "growth"
    - "analytics"
    - "data analyst"
    - "analyst"      # Many applied titles: "Senior Analyst, Commercial Strategy" etc.
    - "consultant"
    - "policy"
  tier3:   # Worth considering — small boost (+7)
    - "campaigns"
    - "civic"
    - "research"
    - "impact"

# ---------- DESCRIPTION KEYWORDS ----------
# Job descriptions mentioning these get a score boost.
description_keywords:
  strong:   # +5 each
    - "management consulting"
    - "A/B testing"
    - "KPIs"
    - "establish KPIs"
    - "build dashboards"
    - "dashboard"
    - "large datasets"
    - "Looker"
    - "market research"
    - "due diligence"
    - "energy"
    - "housing"
    - "industrial"
    - "cross-functional"    # Universal in S&O JDs — strong match signal
    - "go-to-market"        # GTM focus
    - "strategic initiatives" # CoS/S&O signal
    - "program management"  # PM overlap
    - "process improvement" # Ops signal
    - "process optimization"
  moderate:   # +2 each
    - "financial modeling"
    - "stakeholders"
    - "Python"
    - "SQL"
    - "Tableau"
    - "Excel"
    - "data-driven"
    - "nonprofit"
    - "civic"
    - "political"
    - "campaign"
    - "infrastructure"
    - "construction"
    - "OKRs"
    - "executive team"
    - "business case"
    - "workstreams"
    - "roadmap"
    - "operating cadence"
    - "2+ years"            # Mid-level experience signals — boosts appropriate seniority
    - "3+ years"
    - "4+ years"
    - "1-3 years"
    - "2-4 years"

